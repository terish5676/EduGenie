<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library | EduGenie</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/css/design-system.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body { display: flex; height: 100vh; overflow: hidden; background-color: var(--surface-alt); }

    /* Copy sidebar & topbar styles from dashboard */
    .sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
    .sidebar-header { padding: var(--space-xl); display: flex; align-items: center; gap: var(--space-sm); }
    .sidebar-logo { width: 32px; height: 32px; }
    .sidebar-brand { font-size: 1.25rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.02em; }
    .sidebar-nav { padding: 0 var(--space-md); flex: 1; display: flex; flex-direction: column; gap: var(--space-xs); }
    .nav-label { font-size: 0.75rem; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin: var(--space-lg) var(--space-md) var(--space-sm); }
    .nav-item { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); color: var(--text-sec); text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: all var(--duration-fast) var(--ease-fluid); }
    .nav-item i { width: 18px; height: 18px; transition: transform var(--duration-fast) var(--ease-spring); }
    .nav-item:hover { background: var(--bg); color: var(--text-main); }
    .nav-item:hover i { transform: scale(1.1); color: var(--primary); }
    .nav-item.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
    .sidebar-footer { padding: var(--space-lg); border-top: 1px solid var(--border); }
    .logout-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: var(--space-sm); padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); background: transparent; color: var(--text-sec); border: none; font-weight: 500; cursor: pointer; transition: all var(--duration-fast) var(--ease-fluid); }
    .logout-btn:hover { background: #FEF2F2; color: #EF4444; }

    .main-workspace { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
    .topbar { height: 80px; padding: 0 var(--space-2xl); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; background: rgba(241, 245, 249, 0.8); backdrop-filter: blur(12px); }
    .greeting { font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.02em; }
    .topbar-actions { display: flex; align-items: center; gap: var(--space-md); }
    .icon-btn { width: 40px; height: 40px; border-radius: var(--radius-full); background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; transition: all var(--duration-fast) var(--ease-spring); box-shadow: var(--shadow-sm); }
    .icon-btn:hover { color: var(--primary); box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .dash-content { padding: var(--space-xl) var(--space-2xl) var(--space-5xl); max-width: 1200px; margin: 0 auto; width: 100%; }

    /* Notes Grid */
    .notes-layout { display: grid; grid-template-columns: 250px 1fr; gap: var(--space-2xl); margin-top: var(--space-xl); }
    .folders-panel { background: var(--surface); border-radius: var(--radius-xl); border: 1px solid var(--border); padding: var(--space-lg); box-shadow: var(--shadow-sm); height: fit-content; }
    .folders-title { font-weight: 600; font-size: 0.95rem; margin-bottom: var(--space-md); color: var(--text-main); }
    .folder-item { padding: var(--space-sm) var(--space-md); border-radius: var(--radius-sm); font-size: 0.95rem; color: var(--text-sec); cursor: pointer; transition: all var(--duration-fast); }
    .folder-item:hover { background: var(--bg); color: var(--text-main); }
    .folder-item.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
    
    .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-lg); }
    .note-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-lg); box-shadow: var(--shadow-sm); cursor: pointer; transition: all var(--duration-normal) var(--ease-spring); }
    .note-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--border-hover); }

    /* Modals */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); width: 100%; max-width: 600px; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); overflow: hidden; }
    .modal-header { padding: var(--space-lg) var(--space-xl); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-weight: 700; font-size: 1.1rem; }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--text-sec); }
    .modal-body { padding: var(--space-xl); }
    .modal-footer { padding: var(--space-md) var(--space-xl); border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: var(--space-md); background: var(--bg); }
  </style>
</head>
<body>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="/static/assets/logo.svg" alt="EduGenie Logo" class="sidebar-logo">
      <span class="sidebar-brand">EduGenie</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Main Menu</div>
      <a class="nav-item" href="/dashboard"><i data-lucide="layout-dashboard"></i> Workspace</a>
      <a class="nav-item active" href="/notes"><i data-lucide="file-text"></i> Library</a>
      <a class="nav-item" href="/bookmarks"><i data-lucide="bookmark"></i> Bookmarks</a>
      <div class="nav-label">Analytics</div>
      <a class="nav-item" href="/progress"><i data-lucide="activity"></i> Progress</a>
      <a class="nav-item" href="/history"><i data-lucide="clock"></i> History</a>
      <div class="nav-label">Settings</div>
      <a class="nav-item" href="/settings"><i data-lucide="settings"></i> Preferences</a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logout-btn"><i data-lucide="log-out"></i> Sign Out</button>
    </div>
  </div>

  <main class="main-workspace">
    <header class="topbar">
      <div class="greeting">My Library</div>
      <div class="topbar-actions" style="display:flex; align-items:center; gap:var(--space-md);">
        <button class="btn btn-primary" id="new-note-btn">
          <i data-lucide="plus" style="width: 18px;"></i> New Note
        </button>
        <!-- Notification Bell -->
        <div style="position:relative;">
          <button class="icon-btn" id="notif-btn" title="Notifications" style="position:relative;">
            <i data-lucide="bell"></i>
            <span id="notif-badge" style="position:absolute; top:8px; right:10px; width:8px; height:8px; background:#EF4444; border-radius:50%; border:2px solid var(--surface); display:none;"></span>
          </button>
          <div id="notif-panel" style="display:none; position:absolute; top:calc(100% + 10px); right:0; width:340px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); z-index:200; overflow:hidden;">
            <div style="padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
              <div style="font-weight:700; font-size:1rem; color:var(--text-main); display:flex; align-items:center; gap:8px;"><i data-lucide="bell" style="width:16px; color:var(--primary);"></i> Notifications</div>
              <button onclick="window.clearNotifications()" style="font-size:0.8rem; color:var(--primary); background:none; border:none; cursor:pointer; font-weight:600;">Clear all</button>
            </div>
            <div id="notif-list" style="max-height:320px; overflow-y:auto; padding:8px 0;"></div>
          </div>
        </div>
      </div>
    </header>

    <div class="dash-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--space-xl);">
        <input type="text" class="form-input" id="notes-search" placeholder="Search notes..." style="max-width: 400px; margin-bottom: 0;" />
      </div>

      <div class="notes-layout">
        <div class="folders-panel">
          <div class="folders-title">Folders</div>
          <div id="folder-list">
            <div class="folder-item active" data-folder="">📁 All Notes</div>
          </div>
        </div>
        <div class="notes-grid" id="notes-grid">
          <!-- Notes rendered via notes.js -->
        </div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="note-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">New Note</div>
        <button class="modal-close" id="close-modal"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" class="form-input" id="note-title-input" placeholder="Note title..." />
        </div>
        <div class="form-group">
          <label class="form-label">Folder</label>
          <input type="text" class="form-input" id="note-folder-input" placeholder="e.g. Math, Science" value="General" />
        </div>
        <div class="form-group">
          <label class="form-label">Content</label>
          <textarea class="form-input" id="note-content" placeholder="Start writing..." style="min-height:200px; resize:vertical;"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="close-modal-2" onclick="document.getElementById('note-modal').classList.remove('open')">Cancel</button>
        <button class="btn btn-primary" id="save-note-btn">Save Note</button>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
  <script type="module" src="/static/js/notes.js?v=2"></script>
</body>
</html>
