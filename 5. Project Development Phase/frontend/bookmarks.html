<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmarks | EduGenie</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/css/design-system.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body { display: flex; height: 100vh; overflow: hidden; background-color: var(--surface-alt); }
    .sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
    .sidebar-header { padding: var(--space-xl); display: flex; align-items: center; gap: var(--space-sm); }
    .sidebar-logo { width: 32px; height: 32px; }
    .sidebar-brand { font-size: 1.25rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.02em; }
    .sidebar-nav { padding: 0 var(--space-md); flex: 1; display: flex; flex-direction: column; gap: var(--space-xs); }
    .nav-label { font-size: 0.75rem; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin: var(--space-lg) var(--space-md) var(--space-sm); }
    .nav-item { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); color: var(--text-sec); text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: all var(--duration-fast) var(--ease-fluid); }
    .nav-item i { width: 18px; height: 18px; transition: transform var(--duration-fast) var(--ease-spring); }
    .nav-item:hover { background: var(--bg); color: var(--text-main); }
    .nav-item:hover i { transform: scale(1.1); color: var(--primary); }
    .nav-item.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
    .sidebar-footer { padding: var(--space-lg); border-top: 1px solid var(--border); }
    .logout-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: var(--space-sm); padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); background: transparent; color: var(--text-sec); border: none; font-weight: 500; cursor: pointer; transition: all var(--duration-fast) var(--ease-fluid); }
    .logout-btn:hover { background: #FEF2F2; color: #EF4444; }

    .main-workspace { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
    .topbar { height: 80px; padding: 0 var(--space-2xl); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; background: rgba(241, 245, 249, 0.8); backdrop-filter: blur(12px); }
    .greeting { font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.02em; }
    
    .dash-content { padding: var(--space-xl) var(--space-2xl) var(--space-5xl); max-width: 1200px; margin: 0 auto; width: 100%; }
    
    .bookmarks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: var(--space-lg); }
    .bookmark-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-lg); box-shadow: var(--shadow-sm); transition: all var(--duration-normal) var(--ease-spring); }
    .bookmark-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--border-hover); }
  </style>
</head>
<body>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="/static/assets/logo.svg" alt="EduGenie Logo" class="sidebar-logo">
      <span class="sidebar-brand">EduGenie</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Main Menu</div>
      <a class="nav-item" href="/dashboard"><i data-lucide="layout-dashboard"></i> Workspace</a>
      <a class="nav-item" href="/notes"><i data-lucide="file-text"></i> Library</a>
      <a class="nav-item active" href="/bookmarks"><i data-lucide="bookmark"></i> Bookmarks</a>
      <div class="nav-label">Analytics</div>
      <a class="nav-item" href="/progress"><i data-lucide="activity"></i> Progress</a>
      <a class="nav-item" href="/history"><i data-lucide="clock"></i> History</a>
      <div class="nav-label">Settings</div>
      <a class="nav-item" href="/settings"><i data-lucide="settings"></i> Preferences</a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logout-btn"><i data-lucide="log-out"></i> Sign Out</button>
    </div>
  </div>

  <main class="main-workspace">
    <header class="topbar">
      <div class="greeting">Bookmarks</div>
      <div class="topbar-actions" style="display:flex; align-items:center; gap:var(--space-md);">
        <!-- Notification Bell -->
        <div style="position:relative;">
          <button class="icon-btn" id="notif-btn" title="Notifications" style="position:relative;">
            <i data-lucide="bell"></i>
            <span id="notif-badge" style="position:absolute; top:8px; right:10px; width:8px; height:8px; background:#EF4444; border-radius:50%; border:2px solid var(--surface); display:none;"></span>
          </button>
          <div id="notif-panel" style="display:none; position:absolute; top:calc(100% + 10px); right:0; width:340px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); z-index:200; overflow:hidden;">
            <div style="padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
              <div style="font-weight:700; font-size:1rem; color:var(--text-main); display:flex; align-items:center; gap:8px;"><i data-lucide="bell" style="width:16px; color:var(--primary);"></i> Notifications</div>
              <button onclick="window.clearNotifications()" style="font-size:0.8rem; color:var(--primary); background:none; border:none; cursor:pointer; font-weight:600;">Clear all</button>
            </div>
            <div id="notif-list" style="max-height:320px; overflow-y:auto; padding:8px 0;"></div>
          </div>
        </div>
      </div>
    </header>

    <div class="dash-content">
      <div style="display:flex; gap: var(--space-md); margin-bottom: var(--space-xl);">
        <input type="text" class="form-input" id="bookmarks-search" placeholder="Search bookmarks..." style="max-width: 400px; margin-bottom: 0;" />
        <select class="form-input" id="category-filter" style="max-width: 200px; margin-bottom: 0;">
          <option value="">All Categories</option>
          <option value="qa">Q&A</option>
          <option value="explain">Concepts</option>
          <option value="quiz">Quizzes</option>
          <option value="summarize">Summaries</option>
          <option value="roadmap">Roadmaps</option>
        </select>
      </div>

      <div class="bookmarks-grid" id="bookmarks-grid">
        <!-- JS rendered -->
      </div>
    </div>
  </main>

  <script>lucide.createIcons();</script>
  <script type="module" src="/static/js/bookmarks.js"></script>
</body>
</html>
