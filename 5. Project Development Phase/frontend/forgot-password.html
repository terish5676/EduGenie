<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | EduGenie</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/css/design-system.css">
</head>
<body data-page="forgot">

  <div class="ambient-bg"></div>

  <div class="auth-wrapper" style="width: 100%; max-width: 440px; margin: auto; padding: var(--space-xl);">
    <div class="auth-header" style="text-align: center; margin-bottom: var(--space-xl);">
      <img src="/static/assets/logo.svg" alt="EduGenie Logo" style="width: 48px; height: 48px; margin: 0 auto var(--space-md);">
      <h1 class="text-h2">Reset Password.</h1>
      <p class="text-body" style="margin-top: 8px;">Enter your email to receive a reset link.</p>
    </div>
    
    <div class="card" style="padding: var(--space-2xl);">
      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="forgot-email" class="form-input" placeholder="name@school.edu" required>
        </div>
        <button type="submit" class="btn btn-primary" id="forgot-submit" style="width: 100%; margin-top: var(--space-sm);">
          Send Reset Link
        </button>
      </form>
    </div>
    
    <div style="text-align: center; margin-top: var(--space-lg);" class="text-sm">
      Remembered it? <a href="/login" style="font-weight: 600;">Sign in</a>
    </div>
  </div>

  <script type="module" src="/static/js/auth.js"></script>
</body>
</html>
